<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formular de Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="container">
        <h1>Formular de Contact</h1>
        
        <form id="contactForm" action="#" method="POST">
            <div class="form-group">
                <label for="nume">Nume complet:</label>
                <input type="text" id="nume" name="nume" required>
            </div>
            
            <div class="form-group">
                <label for="email">Adresă email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="telefon">Număr telefon:</label>
                <input type="tel" id="telefon" name="telefon">
            </div>
            
            <div class="form-group">
                <label for="subiect">Subiect:</label>
                <input type="text" id="subiect" name="subiect" required>
            </div>
            
            <div class="form-group">
                <label for="mesaj">Mesaj:</label>
                <textarea id="mesaj" name="mesaj" rows="5" required></textarea>
            </div>
            
            <div class="form-group">
                <button type="submit" class="submit-btn">Trimite mesaj</button>
                <button type="reset" class="reset-btn">Resetează formularul</button>
            </div>
        </form>
        
        <div id="statusMessage" style="display: none;"></div>
    </div>
    
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.style.display = 'block';
            statusDiv.className = 'success-message';
            statusDiv.textContent = 'Mesajul a fost trimis cu succes! Vă vom contacta în curând.';
            this.reset();
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
